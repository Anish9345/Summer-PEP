<h2><b>To Do</b></h2>

 <input type="text" class="border-2" (input)="onInput($event)" [value]="todoText">
 <button (click)="addTodo()" class="border-2 cursor-pointer">ADD TODO ✅</button> 


 <div>

 @for(item of todoArr(); track $index){
  <div class="flex flex-wrap gap-6 text-center border-solid m-2 p-2 justify-around cursor-pointer">
    @if(item.isDone){
      <p class="line-through text-red-500 text-4xl p-2">{{item.text}}</p>
      <!-- <button (click)="item.text=''" class="border-2 cursor-pointer bg-red-500">❌Remove</button>  -->
    }@else{
      <p class="text-4xl p-2">{{item.text}}</p>
      <!-- <button (click)="item.isDone=true" class="border-2 cursor-pointer bg-green-500">Done</button> -->
    }


    <button>❌</button>
  </div>
 }

 </div>
