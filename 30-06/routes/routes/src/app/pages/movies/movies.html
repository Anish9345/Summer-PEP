<div class="min-h-screen bg-gray-800 p-8">
  
  <h1 class="text-4xl font-black text-center text-white mb-10 tracking-tight">
    Rick and Morty Characters
  </h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
    
    @for (movie of moviesArr; track movie?.id) {
      <div class="flex flex-col bg-gray-700 rounded-xl overflow-hidden shadow-lg hover:shadow-2xl hover:-translate-y-1 transition-all duration-300">
        
        <img 
          [src]="movie?.image" 
          [alt]="movie?.name" 
          class="w-full h-64 object-cover"
        />

        <div class="p-5 flex flex-col grow">
          <h2 class="text-2xl font-bold text-white truncate" [title]="movie?.name">
            {{ movie?.name }}
          </h2>
          
          <div class="flex items-center gap-2 mt-2">
            <span class="w-3 h-3 rounded-full"
                  [class.bg-green-500]="movie?.status === 'Alive'"
                  [class.bg-red-500]="movie?.status === 'Dead'"
                  [class.bg-gray-400]="movie?.status === 'unknown'">
            </span>
            <span class="text-gray-300 text-sm font-medium">
              {{ movie?.status }} - {{ movie?.species }}
            </span>
          </div>

          <div class="mt-auto pt-4">
            <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider">
              Last known location:
            </span>
            <p class="text-gray-200 text-sm mt-1 truncate" [title]="movie?.location?.name">
              {{ movie?.location?.name || 'Unknown Location' }}
            </p>
          </div>
        </div>
      </div>
    } @empty {
      <div class="col-span-full flex justify-center items-center py-20">
        <p class="text-xl text-gray-400 font-medium">Loading characters...</p>
      </div>
    }

  </div>
</div>

<app-button
[buttonText]="'Fetch Movies'"
(buttonFn)="fetchMovies()"
[buttonSize]="buttonConfig.sizes.SM"
[buttonType]="buttonConfig.types.SUCCESS"
></app-button>


<app-button
[isButtonDisabled]="currPage == 1" 
[buttonText]="'PREV'"
(buttonFn)="fetchMovies()"
[buttonSize]="buttonConfig.sizes.SM"
[buttonType]="buttonConfig.types.PRIMARY"
></app-button>
